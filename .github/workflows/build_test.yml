# ------------------------------------------------------------------
# build_test.yml
# Configures, builds, and tests the library on all target platforms
# ------------------------------------------------------------------

name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: ${{ matrix.os }} | ${{ matrix.compiler }} | ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        build_type: [ Debug, Release ]
        compiler:
          - { cc: gcc,   cxx: g++   }
          - { cc: clang, cxx: clang++ }
        exclude:
          # MSVC is the natural Windows compiler, but we start with gcc/clang via MinGW
          # Clang on Windows needs extra setup — start simple, add later
          - os: windows-latest
            compiler: { cc: clang, cxx: clang++ }

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Set compiler environment (Linux)
      # ------------------------------------------------------------------
      - name: Set compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "CC=${{ matrix.compiler.cc }}"   >> $GITHUB_ENV
          echo "CXX=${{ matrix.compiler.cxx }}" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # 3. Configure
      # ------------------------------------------------------------------
      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DTR_BUILD_TESTS=ON
          -DTR_BUILD_EXAMPLES=ON

      # ------------------------------------------------------------------
      # 4. Build
      # ------------------------------------------------------------------
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      # ------------------------------------------------------------------
      # 5. Test
      # ------------------------------------------------------------------
      - name: Run tests
        working-directory: build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure



        
  # ------------------------------------------------------------------
  # Coverage job - runs on Ubuntu with GCC only
  # ------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: build     # only run if build job passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install gcov and lcov
        run: sudo apt-get install -y lcov

      - name: Configure CMake with coverage
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DTR_BUILD_TESTS=ON
          -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build
        run: cmake --build build

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Generate coverage report
        run: |
          lcov --capture \
               --directory build \
               --output-file coverage.info \
               --ignore-errors mismatch
          lcov --remove coverage.info \
               '*/tests/*' \
               '*/unity/*' \
               '/usr/*' \
               --output-file coverage.info \
               --ignore-errors unused
          lcov --list coverage.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.info
          fail_ci_if_error: true
          verbose: true